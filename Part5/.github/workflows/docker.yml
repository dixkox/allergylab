name: AllergyLab CI/CD

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses:  actions/checkout@v4

    - name: Build images
      run: |
          cd Part 7a
          docker build -t ${{ secrets.DOCKER_USERNAME }}/al-app:latest ./app

          ${{ secrets.DOCKER_USERNAME }}

          docker build -t ${{ secrets.DOCKER_USERNAME }}/al-dbloader:latest ./dbloader
          docker build -t ${{ secrets.DOCKER_USERNAME }}/al-email:latest ./email